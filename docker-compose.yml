services:
  # Database PostgreSQL (OWASP A05: Hardened and isolated network)
  postgres:
    image: postgres:15-alpine
    container_name: match_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_MULTIPLE_DATABASES: match_motoboys,evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script customizado para criar multiplas bases ao subir
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - match_network

  # Cache and Queue Redis
  redis:
    image: redis:7-alpine
    container_name: match_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - match_network

  # Evolution API (WhatsApp REST Integration)
  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: match_evolution
    restart: always
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8080
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,FATAL
      - WPP_LID_MODE=false
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=true
      - WEBSOCKET_ALLOWED_HOSTS=*
      - CORS_ORIGIN=*
      - CORS_METHODS=POST,GET,PUT,DELETE
      - CORS_CREDENTIALS=true
      - PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY:-global_apikey}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgrespassword@postgres:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_WEBHOOK=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - match_network

  # Backend Express API + BullMQ Worker
  backend:
    build: ./backend
    container_name: match_backend
    restart: always
    env_file:
      - ./env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - evolution
    networks:
      - match_network

  # Frontend Nginx React
  frontend:
    build: ./frontend
    container_name: match_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - match_network

volumes:
  postgres_data:
  evolution_instances:

networks:
  match_network:
    driver: bridge
